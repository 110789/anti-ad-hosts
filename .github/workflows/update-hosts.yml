name: Update Hosts

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download & Convert
        run: |
          curl -o anti-ad-domains.txt https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-domains.txt
          
          grep -E '^[a-zA-Z0-9]' anti-ad-domains.txt \
            | grep -v '^!' \
            | sed 's/^/0.0.0.0 /' \
            | sort -u \
            > anti-ad-hosts.txt
          
          echo "共 $(wc -l < anti-ad-hosts.txt) 条规则"

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anti-ad-hosts.txt
          git diff --cached --quiet || git commit -m "update $(date '+%Y-%m-%d %H:%M UTC')"
          git push